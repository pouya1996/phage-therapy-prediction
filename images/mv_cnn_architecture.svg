<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="cnnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mlpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8833A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4722E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fuseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#59A14F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4E8F45;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B8B8B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6E6E6E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B07AA1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C6891;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowBlack" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#222">Multi-View CNN (MV-CNN) Architecture</text>

  <!-- ============================================================ -->
  <!-- CNN BRANCH  (left/top path) -->
  <!-- ============================================================ -->

  <!-- Branch label: CNN Branch -->
  <rect x="30" y="58" width="680" height="28" rx="4" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1"/>
  <text x="370" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#2B5EA7">CNN Branch — Proteomic Features</text>

  <!-- Input (6×27×2) -->
  <rect x="40" y="110" width="130" height="52" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="105" y="133" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Input</text>
  <text x="105" y="149" text-anchor="middle" font-size="11" fill="#ddd">(6 × 27 × 2)</text>

  <!-- Arrow -->
  <line x1="170" y1="136" x2="198" y2="136" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Conv2D -->
  <rect x="200" y="104" width="130" height="64" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="265" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Conv2D</text>
  <text x="265" y="140" text-anchor="middle" font-size="10" fill="#D4E8FF">32 filters, 3×3</text>
  <text x="265" y="154" text-anchor="middle" font-size="10" fill="#D4E8FF">same pad, ReLU</text>

  <!-- Arrow -->
  <line x1="330" y1="136" x2="348" y2="136" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- BatchNorm -->
  <rect x="350" y="114" width="100" height="44" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="400" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Batch</text>
  <text x="400" y="147" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Norm</text>

  <!-- Arrow -->
  <line x1="450" y1="136" x2="468" y2="136" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- MaxPool -->
  <rect x="470" y="114" width="100" height="44" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="520" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">MaxPool</text>
  <text x="520" y="147" text-anchor="middle" font-size="10" fill="#D4E8FF">3 × 3</text>

  <!-- Arrow -->
  <line x1="570" y1="136" x2="588" y2="136" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dropout 0.3 -->
  <rect x="590" y="114" width="100" height="44" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="640" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dropout</text>
  <text x="640" y="147" text-anchor="middle" font-size="10" fill="#D4E8FF">p = 0.3</text>

  <!-- Arrow down -->
  <line x1="640" y1="158" x2="640" y2="188" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Flatten -->
  <rect x="585" y="190" width="110" height="40" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="640" y="215" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Flatten</text>

  <!-- Arrow left -->
  <line x1="585" y1="210" x2="557" y2="210" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dense 1024 -->
  <rect x="420" y="190" width="135" height="50" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="487" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dense (1024)</text>
  <text x="487" y="228" text-anchor="middle" font-size="10" fill="#D4E8FF">ReLU</text>

  <!-- Arrow left -->
  <line x1="420" y1="215" x2="392" y2="215" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- BN + Dropout -->
  <rect x="240" y="192" width="150" height="46" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="315" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">BatchNorm</text>
  <text x="315" y="227" text-anchor="middle" font-size="10" fill="#D4E8FF">+ Dropout 0.3</text>

  <!-- Arrow left -->
  <line x1="240" y1="215" x2="212" y2="215" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dense 128 -->
  <rect x="70" y="190" width="140" height="50" rx="6" fill="url(#cnnGrad)" filter="url(#shadow)"/>
  <text x="140" y="211" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dense (128)</text>
  <text x="140" y="228" text-anchor="middle" font-size="10" fill="#D4E8FF">ReLU — embedding</text>

  <!-- Arrow down from Dense 128 to fusion -->
  <line x1="140" y1="240" x2="140" y2="310" stroke="#444" stroke-width="1.5"/>
  <line x1="140" y1="310" x2="475" y2="410" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dimension label on CNN output -->
  <rect x="90" y="260" width="100" height="22" rx="4" fill="#E8F0FE"/>
  <text x="140" y="276" text-anchor="middle" font-size="10" font-weight="600" fill="#357ABD">128-dim vector</text>


  <!-- ============================================================ -->
  <!-- MLP BRANCH  (right path) -->
  <!-- ============================================================ -->

  <!-- Branch label: MLP Branch -->
  <rect x="740" y="58" width="340" height="28" rx="4" fill="#FEF0E5" stroke="#E8833A" stroke-width="1"/>
  <text x="910" y="77" text-anchor="middle" font-size="13" font-weight="600" fill="#B85C1F">MLP Branch — Metadata</text>

  <!-- Input (4,) -->
  <rect x="845" y="110" width="130" height="52" rx="6" fill="url(#inputGrad)" filter="url(#shadow)"/>
  <text x="910" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Input</text>
  <text x="910" y="146" text-anchor="middle" font-size="10" fill="#ddd">(4,) morph + conc</text>

  <!-- Arrow down -->
  <line x1="910" y1="162" x2="910" y2="188" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dense 64 -->
  <rect x="850" y="190" width="120" height="44" rx="6" fill="url(#mlpGrad)" filter="url(#shadow)"/>
  <text x="910" y="209" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dense (64)</text>
  <text x="910" y="224" text-anchor="middle" font-size="10" fill="#FFE0C2">ReLU</text>

  <!-- Arrow down -->
  <line x1="910" y1="234" x2="910" y2="260" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dense 32 -->
  <rect x="850" y="262" width="120" height="44" rx="6" fill="url(#mlpGrad)" filter="url(#shadow)"/>
  <text x="910" y="281" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dense (32)</text>
  <text x="910" y="296" text-anchor="middle" font-size="10" fill="#FFE0C2">ReLU</text>

  <!-- Arrow down -->
  <line x1="910" y1="306" x2="910" y2="332" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dense 16 -->
  <rect x="850" y="334" width="120" height="44" rx="6" fill="url(#mlpGrad)" filter="url(#shadow)"/>
  <text x="910" y="353" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dense (16)</text>
  <text x="910" y="368" text-anchor="middle" font-size="10" fill="#FFE0C2">ReLU</text>

  <!-- Arrow from MLP Dense 16 to fusion -->
  <line x1="910" y1="378" x2="910" y2="410" stroke="#444" stroke-width="1.5"/>
  <line x1="910" y1="410" x2="615" y2="410" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dimension label on MLP output -->
  <rect x="860" y="390" width="100" height="22" rx="4" fill="#FEF0E5"/>
  <text x="910" y="405" text-anchor="middle" font-size="10" font-weight="600" fill="#D4722E">16-dim vector</text>


  <!-- ============================================================ -->
  <!-- FUSION SECTION -->
  <!-- ============================================================ -->

  <!-- Branch label: Fusion -->
  <rect x="350" y="390" width="280" height="28" rx="4" fill="#EAF5E8" stroke="#59A14F" stroke-width="1"/>
  <text x="490" y="409" text-anchor="middle" font-size="13" font-weight="600" fill="#3E7F35">Fusion</text>

  <!-- Concatenate -->
  <rect x="435" y="430" width="150" height="50" rx="6" fill="url(#fuseGrad)" filter="url(#shadow)"/>
  <text x="510" y="451" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Concatenate</text>
  <text x="510" y="468" text-anchor="middle" font-size="10" fill="#D4F5D0">128 + 16 = 144-dim</text>

  <!-- Arrow down -->
  <line x1="510" y1="480" x2="510" y2="506" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dense 32 (fusion) -->
  <rect x="445" y="508" width="130" height="44" rx="6" fill="url(#fuseGrad)" filter="url(#shadow)"/>
  <text x="510" y="527" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dense (32)</text>
  <text x="510" y="542" text-anchor="middle" font-size="10" fill="#D4F5D0">ReLU</text>

  <!-- Arrow down -->
  <line x1="510" y1="552" x2="510" y2="578" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Dense 1 (output) -->
  <rect x="445" y="580" width="130" height="44" rx="6" fill="url(#outputGrad)" filter="url(#shadow)"/>
  <text x="510" y="599" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Dense (1)</text>
  <text x="510" y="614" text-anchor="middle" font-size="10" fill="#E8D4E0">Sigmoid</text>

  <!-- Arrow down -->
  <line x1="510" y1="624" x2="510" y2="650" stroke="#444" stroke-width="1.5" marker-end="url(#arrowBlack)"/>

  <!-- Output label -->
  <rect x="420" y="652" width="180" height="42" rx="8" fill="#F5F5F5" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="510" y="670" text-anchor="middle" font-size="12" font-weight="600" fill="#444">P(interaction)</text>
  <text x="510" y="685" text-anchor="middle" font-size="10" fill="#888">[0, 1]</text>

  <!-- ============================================================ -->
  <!-- INPUT DETAIL BOXES (bottom-left) -->
  <!-- ============================================================ -->

  <!-- Phage channel detail -->
  <rect x="30" y="480" width="170" height="80" rx="6" fill="#fff" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="115" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#357ABD">Channel 0 — Phage</text>
  <text x="115" y="516" text-anchor="middle" font-size="9.5" fill="#555">6 × 27 matrix</text>
  <text x="115" y="530" text-anchor="middle" font-size="9" fill="#777">mean / max / min /</text>
  <text x="115" y="543" text-anchor="middle" font-size="9" fill="#777">std / var / median</text>
  <text x="115" y="556" text-anchor="middle" font-size="9" fill="#777">of 27 protein features</text>

  <!-- Host channel detail -->
  <rect x="220" y="480" width="170" height="80" rx="6" fill="#fff" stroke="#4A90D9" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="305" y="500" text-anchor="middle" font-size="10" font-weight="600" fill="#357ABD">Channel 1 — Host</text>
  <text x="305" y="516" text-anchor="middle" font-size="9.5" fill="#555">6 × 27 matrix</text>
  <text x="305" y="530" text-anchor="middle" font-size="9" fill="#777">mean / max / min /</text>
  <text x="305" y="543" text-anchor="middle" font-size="9" fill="#777">std / var / median</text>
  <text x="305" y="556" text-anchor="middle" font-size="9" fill="#777">of 27 protein features</text>

  <!-- MLP detail -->
  <rect x="220" y="575" width="170" height="65" rx="6" fill="#fff" stroke="#E8833A" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="305" y="593" text-anchor="middle" font-size="10" font-weight="600" fill="#D4722E">Metadata Vector (4)</text>
  <text x="305" y="609" text-anchor="middle" font-size="9" fill="#777">Morphology (one-hot × 3)</text>
  <text x="305" y="623" text-anchor="middle" font-size="9" fill="#777">+ log₁₀(concentration)</text>

  <!-- Legend -->
  <rect x="740" y="470" width="340" height="130" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="910" y="492" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Training Configuration</text>
  <text x="760" y="514" font-size="10" fill="#555">Optimiser: Adam (lr = 1 × 10⁻⁴)</text>
  <text x="760" y="530" font-size="10" fill="#555">Loss: Binary Cross-Entropy</text>
  <text x="760" y="546" font-size="10" fill="#555">Epochs: 100 (early stop, patience 20)</text>
  <text x="760" y="562" font-size="10" fill="#555">LR Schedule: ReduceOnPlateau (×0.5, p=10)</text>
  <text x="760" y="578" font-size="10" fill="#555">Batch Size: 32</text>
  <text x="760" y="594" font-size="10" fill="#555">Input Scaling: StandardScaler (per-train fit)</text>

</svg>
