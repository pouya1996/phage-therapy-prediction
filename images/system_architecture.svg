<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="prepGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#59A14F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4E8F45;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="predGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8833A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4722E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="deployGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B07AA1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9C6891;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76B7B2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5FA09B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inputGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#666;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555;stop-opacity:1" />
    </linearGradient>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="106%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.13"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#444"/>
    </marker>
    <marker id="arrW" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#999"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="850" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#222">End-to-End System Architecture</text>
  <text x="600" y="56" text-anchor="middle" font-size="12" fill="#777">Phage–Host Interaction Prediction Framework</text>

  <!-- ============================================================ -->
  <!-- ROW 1 — INPUT -->
  <!-- ============================================================ -->

  <!-- Clinical Isolate FASTA -->
  <rect x="70" y="80" width="180" height="60" rx="8" fill="url(#inputGrad)" filter="url(#sh)"/>
  <text x="160" y="106" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Clinical Isolate</text>
  <text x="160" y="122" text-anchor="middle" font-size="11" fill="#ccc">FASTA genome</text>

  <!-- Phage Library -->
  <rect x="70" y="160" width="180" height="60" rx="8" fill="url(#inputGrad)" filter="url(#sh)"/>
  <text x="160" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Phage Library</text>
  <text x="160" y="202" text-anchor="middle" font-size="11" fill="#ccc">3,449 FASTA genomes</text>

  <!-- Arrows to preprocessing -->
  <line x1="250" y1="110" x2="308" y2="148" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="250" y1="190" x2="308" y2="168" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>


  <!-- ============================================================ -->
  <!-- MODULE 1 — PREPROCESSING -->
  <!-- ============================================================ -->

  <!-- Module box -->
  <rect x="310" y="78" width="410" height="200" rx="10" fill="#E8F0FE" stroke="#4A90D9" stroke-width="1.5" filter="url(#sh)"/>
  <text x="515" y="100" text-anchor="middle" font-size="14" font-weight="700" fill="#2B5EA7">Preprocessing Module</text>

  <!-- ORF Finding -->
  <rect x="330" y="112" width="110" height="42" rx="6" fill="url(#prepGrad)"/>
  <text x="385" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">ORF Finding</text>
  <text x="385" y="144" text-anchor="middle" font-size="9" fill="#BDD7F5">6 reading frames</text>

  <!-- Arrow -->
  <line x1="440" y1="133" x2="458" y2="133" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Protein Translation -->
  <rect x="460" y="112" width="110" height="42" rx="6" fill="url(#prepGrad)"/>
  <text x="515" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Translation</text>
  <text x="515" y="144" text-anchor="middle" font-size="9" fill="#BDD7F5">DNA → Protein</text>

  <!-- Arrow -->
  <line x1="570" y1="133" x2="588" y2="133" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Feature Extraction -->
  <rect x="590" y="112" width="110" height="42" rx="6" fill="url(#prepGrad)"/>
  <text x="645" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Feature Extr.</text>
  <text x="645" y="144" text-anchor="middle" font-size="9" fill="#BDD7F5">27-dim per protein</text>

  <!-- Arrow down from Feature Extraction -->
  <line x1="645" y1="154" x2="645" y2="173" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Feature detail boxes -->
  <rect x="330" y="175" width="115" height="42" rx="5" fill="#fff" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="387" y="192" text-anchor="middle" font-size="9" font-weight="600" fill="#357ABD">AAC (21)</text>
  <text x="387" y="206" text-anchor="middle" font-size="8.5" fill="#777">Amino acid comp.</text>

  <rect x="455" y="175" width="115" height="42" rx="5" fill="#fff" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="512" y="192" text-anchor="middle" font-size="9" font-weight="600" fill="#357ABD">CHONS (5)</text>
  <text x="512" y="206" text-anchor="middle" font-size="8.5" fill="#777">Elemental comp.</text>

  <rect x="580" y="175" width="115" height="42" rx="5" fill="#fff" stroke="#4A90D9" stroke-width="0.8"/>
  <text x="637" y="192" text-anchor="middle" font-size="9" font-weight="600" fill="#357ABD">MW (1)</text>
  <text x="637" y="206" text-anchor="middle" font-size="8.5" fill="#777">Molecular weight</text>

  <!-- Arrow down to Aggregation -->
  <line x1="515" y1="217" x2="515" y2="229" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Aggregation -->
  <rect x="440" y="231" width="150" height="38" rx="6" fill="url(#prepGrad)"/>
  <text x="515" y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Aggregation</text>
  <text x="515" y="261" text-anchor="middle" font-size="9" fill="#BDD7F5">mean/max/min/std/var/med</text>

  <!-- Arrow RIGHT out of preprocessing -->
  <line x1="720" y1="178" x2="758" y2="178" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output: Feature Matrix -->
  <rect x="760" y="146" width="150" height="65" rx="8" fill="url(#dataGrad)" filter="url(#sh)"/>
  <text x="835" y="170" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Feature Matrix</text>
  <text x="835" y="186" text-anchor="middle" font-size="10" fill="#D4F0EE">6 × 27 × 2</text>
  <text x="835" y="200" text-anchor="middle" font-size="9" fill="#D4F0EE">(phage + host)</text>


  <!-- ============================================================ -->
  <!-- MODULE 2 — TRAINING (below, left) -->
  <!-- ============================================================ -->

  <rect x="70" y="310" width="500" height="230" rx="10" fill="#EAF5E8" stroke="#59A14F" stroke-width="1.5" filter="url(#sh)"/>
  <text x="320" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#3E7F35">Training Module</text>

  <!-- Arrow from Feature Matrix down to Training -->
  <line x1="835" y1="211" x2="835" y2="270" stroke="#444" stroke-width="1.5"/>
  <line x1="835" y1="270" x2="320" y2="270" stroke="#444" stroke-width="1.5"/>
  <line x1="320" y1="270" x2="320" y2="308" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1: CV -->
  <rect x="90" y="350" width="140" height="60" rx="6" fill="url(#trainGrad)" filter="url(#sh)"/>
  <text x="160" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Step 1</text>
  <text x="160" y="388" text-anchor="middle" font-size="10" fill="#D4F5D0">10-Fold CV</text>
  <text x="160" y="402" text-anchor="middle" font-size="9" fill="#D4F5D0">on train set</text>

  <!-- Arrow -->
  <line x1="230" y1="380" x2="248" y2="380" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Step 2: Test Eval -->
  <rect x="250" y="350" width="140" height="60" rx="6" fill="url(#trainGrad)" filter="url(#sh)"/>
  <text x="320" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Step 2</text>
  <text x="320" y="388" text-anchor="middle" font-size="10" fill="#D4F5D0">Test Evaluation</text>
  <text x="320" y="402" text-anchor="middle" font-size="9" fill="#D4F5D0">91 unseen hosts</text>

  <!-- Arrow -->
  <line x1="390" y1="380" x2="408" y2="380" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Step 3: Retrain -->
  <rect x="410" y="350" width="140" height="60" rx="6" fill="url(#trainGrad)" filter="url(#sh)"/>
  <text x="480" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Step 3</text>
  <text x="480" y="388" text-anchor="middle" font-size="10" fill="#D4F5D0">Production Retrain</text>
  <text x="480" y="402" text-anchor="middle" font-size="9" fill="#D4F5D0">ALL data</text>

  <!-- Models list -->
  <rect x="90" y="425" width="460" height="48" rx="5" fill="#fff" stroke="#59A14F" stroke-width="0.8"/>
  <text x="320" y="443" text-anchor="middle" font-size="10" font-weight="600" fill="#3E7F35">7 Models Trained</text>
  <text x="320" y="460" text-anchor="middle" font-size="9.5" fill="#555">KNN  •  SVM  •  Random Forest  •  XGBoost  •  AdaBoost  •  Logistic Regression  •  MV-CNN</text>

  <!-- Arrow down from Training to Saved Models -->
  <line x1="320" y1="480" x2="320" y2="500" stroke="#444" stroke-width="1.5"/>
  <line x1="320" y1="500" x2="320" y2="530" stroke="#444" stroke-width="1.5"/>

  <!-- Saved Models -->
  <rect x="220" y="505" width="200" height="45" rx="8" fill="url(#dataGrad)" filter="url(#sh)"/>
  <text x="320" y="525" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Saved Models</text>
  <text x="320" y="540" text-anchor="middle" font-size="9.5" fill="#D4F0EE">.joblib + .keras + scalers</text>

  <!-- Arrow from Saved Models to Prediction -->
  <line x1="420" y1="527" x2="618" y2="527" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>


  <!-- ============================================================ -->
  <!-- MODULE 3 — PREDICTION (below, right) -->
  <!-- ============================================================ -->

  <rect x="620" y="310" width="540" height="260" rx="10" fill="#FEF0E5" stroke="#E8833A" stroke-width="1.5" filter="url(#sh)"/>
  <text x="890" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#B85C1F">Prediction Module</text>

  <!-- Arrow from Feature Matrix down to Prediction -->
  <line x1="835" y1="270" x2="890" y2="270" stroke="#444" stroke-width="1.5"/>
  <line x1="890" y1="270" x2="890" y2="308" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- New Isolate -->
  <rect x="640" y="350" width="150" height="55" rx="6" fill="url(#predGrad)" filter="url(#sh)"/>
  <text x="715" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">New Isolate</text>
  <text x="715" y="388" text-anchor="middle" font-size="10" fill="#FFE0C2">Upload FASTA</text>
  <text x="715" y="400" text-anchor="middle" font-size="9" fill="#FFE0C2">→ preprocess on-the-fly</text>

  <!-- Arrow -->
  <line x1="790" y1="377" x2="808" y2="377" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Pair with Library -->
  <rect x="810" y="350" width="150" height="55" rx="6" fill="url(#predGrad)" filter="url(#sh)"/>
  <text x="885" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Pair with</text>
  <text x="885" y="388" text-anchor="middle" font-size="10" fill="#FFE0C2">Phage Library</text>
  <text x="885" y="400" text-anchor="middle" font-size="9" fill="#FFE0C2">3,449 pairs created</text>

  <!-- Arrow -->
  <line x1="960" y1="377" x2="978" y2="377" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Predict All Models -->
  <rect x="980" y="350" width="160" height="55" rx="6" fill="url(#predGrad)" filter="url(#sh)"/>
  <text x="1060" y="372" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Predict</text>
  <text x="1060" y="388" text-anchor="middle" font-size="10" fill="#FFE0C2">All 7 Models</text>
  <text x="1060" y="400" text-anchor="middle" font-size="9" fill="#FFE0C2">P(interaction)</text>

  <!-- Arrow down -->
  <line x1="1060" y1="405" x2="1060" y2="430" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Ranker -->
  <rect x="810" y="430" width="160" height="50" rx="6" fill="url(#predGrad)" filter="url(#sh)"/>
  <text x="890" y="452" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Ranker</text>
  <text x="890" y="467" text-anchor="middle" font-size="10" fill="#FFE0C2">Sort by probability</text>

  <!-- Arrow left from Predict to Ranker -->
  <line x1="1060" y1="455" x2="972" y2="455" stroke="#444" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Arrow down from Ranker -->
  <line x1="890" y1="480" x2="890" y2="515" stroke="#444" stroke-width="1.5"/>

  <!-- Ranked Output -->
  <rect x="770" y="515" width="240" height="45" rx="8" fill="url(#dataGrad)" filter="url(#sh)"/>
  <text x="890" y="535" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">Ranked Phage Cocktail</text>
  <text x="890" y="550" text-anchor="middle" font-size="9.5" fill="#D4F0EE">per-model recommendations</text>


  <!-- ============================================================ -->
  <!-- MODULE 4 — DEPLOYMENT -->
  <!-- ============================================================ -->

  <rect x="250" y="620" width="700" height="200" rx="10" fill="#F3EBF5" stroke="#B07AA1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="645" text-anchor="middle" font-size="14" font-weight="700" fill="#7A5A6F">Deployment Module</text>

  <!-- Arrow down from Ranked Output to Deployment -->
  <line x1="890" y1="560" x2="890" y2="590" stroke="#444" stroke-width="1.5"/>
  <line x1="890" y1="590" x2="600" y2="590" stroke="#444" stroke-width="1.5"/>
  <line x1="600" y1="590" x2="600" y2="618" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FastAPI Backend -->
  <rect x="280" y="665" width="200" height="65" rx="6" fill="url(#deployGrad)" filter="url(#sh)"/>
  <text x="380" y="690" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">FastAPI Backend</text>
  <text x="380" y="706" text-anchor="middle" font-size="10" fill="#E8D4E0">REST API (port 8000)</text>
  <text x="380" y="720" text-anchor="middle" font-size="9" fill="#E8D4E0">/api/predict endpoint</text>

  <!-- Arrow -->
  <line x1="480" y1="697" x2="518" y2="697" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- React Frontend -->
  <rect x="520" y="665" width="200" height="65" rx="6" fill="url(#deployGrad)" filter="url(#sh)"/>
  <text x="620" y="690" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">React Dashboard</text>
  <text x="620" y="706" text-anchor="middle" font-size="10" fill="#E8D4E0">Interactive UI (port 3000)</text>
  <text x="620" y="720" text-anchor="middle" font-size="9" fill="#E8D4E0">Vite + Recharts</text>

  <!-- Arrow -->
  <line x1="720" y1="697" x2="758" y2="697" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Clinician -->
  <rect x="760" y="660" width="160" height="75" rx="8" fill="#fff" stroke="#B07AA1" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="840" y="685" text-anchor="middle" font-size="12" font-weight="600" fill="#7A5A6F">Clinician</text>
  <text x="840" y="702" text-anchor="middle" font-size="9.5" fill="#777">Upload genome</text>
  <text x="840" y="716" text-anchor="middle" font-size="9.5" fill="#777">View predictions</text>
  <text x="840" y="730" text-anchor="middle" font-size="9.5" fill="#777">Download results</text>

  <!-- Feature breakdown inside deployment -->
  <rect x="280" y="745" width="300" height="55" rx="5" fill="#fff" stroke="#B07AA1" stroke-width="0.8"/>
  <text x="430" y="763" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7A5A6F">Dashboard Features</text>
  <text x="430" y="778" text-anchor="middle" font-size="9" fill="#555">Radar chart  •  Bar charts  •  Model tabs</text>
  <text x="430" y="792" text-anchor="middle" font-size="9" fill="#555">CV panel  •  PNG/CSV export  •  Ranked tables</text>

  <!-- Dataset box -->
  <rect x="600" y="745" width="320" height="55" rx="5" fill="#fff" stroke="#B07AA1" stroke-width="0.8"/>
  <text x="760" y="763" text-anchor="middle" font-size="9.5" font-weight="600" fill="#7A5A6F">Dataset Statistics</text>
  <text x="760" y="778" text-anchor="middle" font-size="9" fill="#555">7,500 interactions  •  3,449 phages  •  301 hosts</text>
  <text x="760" y="792" text-anchor="middle" font-size="9" fill="#555">Train: 5,676 (210 hosts)  •  Test: 1,824 (91 hosts)</text>

  <!-- Data flow labels -->
  <rect x="940" y="86" width="115" height="20" rx="3" fill="#E8F0FE"/>
  <text x="997" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#357ABD">Preprocessing</text>

  <rect x="940" y="112" width="115" height="20" rx="3" fill="#EAF5E8"/>
  <text x="997" y="126" text-anchor="middle" font-size="9" font-weight="600" fill="#3E7F35">Training</text>

  <rect x="940" y="138" width="115" height="20" rx="3" fill="#FEF0E5"/>
  <text x="997" y="152" text-anchor="middle" font-size="9" font-weight="600" fill="#B85C1F">Prediction</text>

  <rect x="940" y="164" width="115" height="20" rx="3" fill="#F3EBF5"/>
  <text x="997" y="178" text-anchor="middle" font-size="9" font-weight="600" fill="#7A5A6F">Deployment</text>

  <rect x="940" y="190" width="115" height="20" rx="3" fill="#D4F0EE"/>
  <text x="997" y="204" text-anchor="middle" font-size="9" font-weight="600" fill="#5FA09B">Data Artifact</text>

</svg>
